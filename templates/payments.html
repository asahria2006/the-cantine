{% extends "layout.html" %}

{% block main %}
    <div class="container">
        <div class="justify-content-around d-flex mt-5 pt-5">
            <div class="col-6 my-5 p-5 border border-2 rounded-4 bg-white shadow">
                <form id="paymentForm">
                    <div class="mb-3">
                        <label for="username" class="form-label text-primary fw-medium">Insert Your 16-digit Coupon</label>
                        <input type="text" class="form-control border-primary" id="couponCode" aria-describedby="code">
                    </div>

                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary text-light fw-medium px-4 shadow" id="rechargeBtn">Recharge</button>
                        <span class="text-primary py-1 fs-5 fw-semibold pe-2" id="currentBalance">Current balance: <span class="text-success">{{user.balance}}€</span></span>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}

{% block script %}
    <script src="{{ url_for('static', filename='js/payment.js') }}" type="module">
    </script>
{% endblock %}
