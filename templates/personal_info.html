{% extends "layout.html" %}
{% block main %}
    <main>
        <div class="container">
            <div class="justify-content-center d-flex">
                <div class="col-6 my-4">
                    <form id="personal_info">
                        <div class="row">
                            <div class="mb-3 col">
                                <label for="firstName" class="form-label text-primary">First Name</label>
                                <input type="text" class="form-control"  id="firstName" name="first_name" disabled readonly>
                            </div>
                            <div class="mb-3 col">
                                <label for="lastName" class="form-label text-primary">Last Name</label>
                                <input type="text" class="form-control" id="lastName" name="last_name" disabled readonly>
                            </div>
                        </div>

                        <div class="row">
                            <div class="mb-3 col-8">
                                <label for="class" class="form-label text-primary">Class</label>
                                <input type="text" class="form-control" id="studentClass" name="class" disabled readonly>
                            </div>
                            <div class="mb-3 col-4">
                                <label for="tier" class="form-label text-primary">Tier</label>
                                <input type="number" class="form-control" id="tier" name="tier" disabled readonly>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label text-primary">Email</label>
                            <input type="email" class="form-control bg-white" id="email" name="email">
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label text-primary">username</label>
                            <input type="text" class="form-control" id="username" name="username" disabled readonly>
                        </div>
                        <button class="btn btn-primary px-4 fw-medium text-light" id="updateBtn">Update</button>
                    </form>
                </div>
            </div>
            
        </div>
        
    </main>
{% endblock %}

{% block script %}
    <script src="{{ url_for('static', filename='js/personal_info.js') }}" type="module">
    </script>
{% endblock %}
