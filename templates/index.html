<section id="hero" style="
    background-image: url('../static/images/hero-2.jpg');
    height: 400px;
    background-size: cover;
    background-position: center;
    ">

    <div class="p-5 text-center h-100" style="background-color: rgba(0, 0, 0, 0.7);">
        <div class="d-flex justify-content-center align-items-center h-100">
            <div class="text-white">
                <h1 class="mb-3">Welcome Back {{user.firstname}}! </h1>
                <h4 class="mb-3">Your one stop solution for school meals</h4>
            </div>
        </div>
    </div>

</section>


<section id="summury" class="bg-light border-bottom bg-white shadow-sm">
    <div class="container">
        <div class="d-flex justify-content-center">
            <div class="d-flex col-10 justify-content-around flex-row text-center text-primary">
            <span class="fs-5 col-3 fw-semibold p-3 py-4 border-end border-2">Name: {{user.firstname}} {{user.lastname}}</span>
            <span class="fs-5 col-3 fw-semibold p-3 py-4 border-end border-2">Class: {{user.section}}</span>
            <span class="fs-5 col-3 fw-semibold p-3 py-4 border-end border-2">Tier: {{user.tier}}</span>
            <span class="fs-5 col-3 fw-semibold p-3 py-4">Balance: <span class="text-success">{{user.balance}}€</span></span>
            </div>
        </div>
    </div>
</section>
