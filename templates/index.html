<script>
    const bday = "{{bday}}";

    if (bday) {
        wish();
    }
    function wish() {
        
        const messages = [
            {
                title: "Happy Birthday NEGGAAA!",
                text: "HBD NEGGA I'm so glad that i could become your best friend because it's a blessing to get a friend like you nowadays, tho we are maintaining a long-distance friendship, but distance won't matter if our intentions are pure",
                image: "../static/images/eid/eid1.jpg"
            },
            {
                title: "HAGA WISHH",
                text: "I just wanna say bro i wish we would meet soon in the future 🫂 🤗 and as i said pasaria gonna fuck everyone's wife but surely won't fuck yours since uita amader bhabi but wife er shali thakle dis",
                image: "../static/images/eid/eid2.jpg"
            },
            {
                title: "HAGAR VALOBASHA",
                text: "I love you bro 🫂 after exam i wish we would be able to play roblox and laugh like before, and lastly, i wanna say thanks to you for accepting a weirdo like me your bestie",
                image: "../static/images/eid/eid3.jpg"
            },
            {
                title: "ANUS PLAN",
                text: "Lastly please 🙏🏻 in the future, if we get a chance to meet, i would love to take you on a date and gove u some BACKSHOTS for you my bro",
                image: "../static/images/eid/eid4.jpg"
            },
            {
                title: "END OF CONSTIPATION",
                text: "Final and last words hopefully 🙏🏻 tor ei birthday gift ta bhalo lagse bhalo lagle i love you and i want you to give me a backshot till i marry a real girl🤡😝 just kidding",
                image: "../static/images/eid/eid5.jpg",
                credits: [
                    "Your friend - PASAARIA ",
                    "20% NEGGA CREDIT to SNEHA_DOX"
                ]
            }
        ];

        let index = 0;

        const overlay = document.createElement("div");
        overlay.className = "bday-overlay";

        overlay.innerHTML = `
            <div class="bday-card animate">
                <img id="bday-image" class="bday-image" alt="Birthday image" />
                <div class="bday-content">
                    <h1 id="bday-title"></h1>
                    <p id="bday-text"></p>
                    <div id="bday-credits" class="bday-credits"></div>
                    <button id="bday-btn">Next</button>
                </div>
            </div>
        `;

        document.body.appendChild(overlay);
        addStyles();
        renderCard();

        document.getElementById("bday-btn").addEventListener("click", () => {
            index++;
            if (index < messages.length) {
                renderCard();
            } else {
                overlay.remove();
            }
        });

        function renderCard() {
            const msg = messages[index];

            document.getElementById("bday-title").textContent = msg.title;
            document.getElementById("bday-text").textContent = msg.text;
            document.getElementById("bday-image").src = msg.image;

            const creditsBox = document.getElementById("bday-credits");
            creditsBox.innerHTML = "";

            if (msg.credits) {
                msg.credits.forEach(c => {
                    const p = document.createElement("p");
                    p.textContent = c;
                    creditsBox.appendChild(p);
                });
                creditsBox.style.display = "block";
            } else {
                creditsBox.style.display = "none";
            }

            const btn = document.getElementById("bday-btn");
            btn.textContent = index === messages.length - 1 ? "HAGA Done" : "Next";

            const card = document.querySelector(".bday-card");
            card.classList.remove("animate");
            void card.offsetWidth;
            card.classList.add("animate");
        }
    }

    function addStyles() {
        if (document.getElementById("bday-style")) return;

        const style = document.createElement("style");
        style.id = "bday-style";
        style.innerHTML = `
            .bday-overlay {
                position: fixed;
                inset: 0;
                background: linear-gradient(135deg, #667eea, #764ba2);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            .bday-card {
                background: white;
                display: flex;
                gap: 25px;
                padding: 30px;
                border-radius: 20px;
                max-width: 650px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.25);
                font-family: 'Segoe UI', sans-serif;
            }

            .bday-card.animate {
                animation: pop 0.6s ease;
            }

            .bday-image {
                width: 200px;
                height: 200px;
                object-fit: cover;
                border-radius: 15px;
                flex-shrink: 0;
            }

            .bday-content {
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .bday-content h1 {
                color: #764ba2;
                margin-bottom: 15px;
            }

            .bday-content p {
                font-size: 17px;
                color: #333;
                margin-bottom: 15px;
            }

            .bday-credits {
                margin-top: 10px;
                padding-top: 10px;
                border-top: 1px dashed #ddd;
                font-size: 14px;
                color: #555;
            }

            .bday-credits p {
                margin: 4px 0;
                font-weight: bold;
            }

            .bday-content button {
                margin-top: 15px;
                align-self: flex-start;
                padding: 10px 28px;
                border: none;
                border-radius: 25px;
                background: #764ba2;
                color: white;
                font-size: 16px;
                cursor: pointer;
                transition: transform 0.2s, background 0.2s;
            }

            .bday-content button:hover {
                transform: scale(1.08);
                background: #667eea;
            }

            @keyframes pop {
                from { transform: scale(0.85); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }

            @media (max-width: 600px) {
                .bday-card {
                    flex-direction: column;
                    text-align: center;
                }

                .bday-image {
                    width: 100%;
                    height: 180px;
                }

                .bday-content button {
                    align-self: center;
                }
            }
        `;
        document.head.appendChild(style);
    }
</script>
