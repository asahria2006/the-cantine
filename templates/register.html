{% extends "layout.html" %}
{% block main %}
    <main>
        <div class="container">
            <div class="justify-content-center d-flex">
                <div class="col-6 my-4">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="firstName" name="first_name">
                        </div>
                        <div class="mb-3">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="lastName" name="last_name">
                        </div>
                        <div class="mb-3">
                            <label for="class" class="form-label">Class</label>
                            <input type="text" class="form-control" id="studentClass" name="class">
                        </div>
                        <div class="mb-3">
                            <label for="tier" class="form-label">Tier</label>
                            <input type="number" class="form-control" id="tier" name="tier">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email">
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Choise an username</label>
                            <input type="text" class="form-control" id="username" name="username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Confirm your password</label>
                            <input type="password" class="form-control" id="confirmPassword" name="confirm_password">
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="exampleCheck1">
                            <label class="form-check-label" for="exampleCheck1">I agree all <a class="link" href="/termsandconditions">termes & conditions</a> </label>
                        </div>
                        <button class="btn btn-primary px-4 fw-medium text-light" id="registerButton">Register</button>
                    </form>
                </div>
            </div>
            
        </div>
        
    </main>
{% endblock %}

{% block script %}
    <script src="{{ url_for('static', filename='js/registration.js') }}">
    </script>
{% endblock %}
